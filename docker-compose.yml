version: '3.8'

services:

  # ─────────────────────────────────────────────────────────────
  # BASE DE DONNÉES KEYCLOAK
  # ─────────────────────────────────────────────────────────────
  keycloak-db:
    image: postgres:17
    container_name: keycloak-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # KEYCLOAK
  # ─────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_LOG_LEVEL: info
      KC_CACHE_THEME_RESOURCES: "false"
      KC_CACHE_THEME_TEMPLATES: "false"
    command: start-dev --import-realm
    volumes:
      - "C:\\dev\\Projet-App-Finance\\infra-keycloak\\keycloak\\realm-dev.json:/opt/keycloak/data/import/realm.json:ro"
      - "C:\\dev\\Projet-App-Finance\\infra-keycloak\\keycloak\\themes:/opt/keycloak/themes:rw"
    ports:
      - "8080:8080"
    networks:
      - finance-net

  # ─────────────────────────────────────────────────────────────
  # BASE DE DONNÉES APPLICATIVE
  # ─────────────────────────────────────────────────────────────
  app-db:
    image: postgres:17
    container_name: app-db
    restart: always
    environment:
      POSTGRES_DB: ${APP_DB:-financeapp}
      POSTGRES_USER: ${APP_DB_USER:-financeapp}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-financeapp}
      POSTGRES_INITDB_ARGS: "-c password_encryption=md5"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - finance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-financeapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "password_encryption=md5"

volumes:
  keycloak_data:
  app_db_data:

networks:
  finance-net: