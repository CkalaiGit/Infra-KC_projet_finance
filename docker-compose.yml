version: '3.8'

services:
  # Base de données pour Keycloak
  keycloak-db:
    image: postgres:17
    container_name: keycloak-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    ports:
      - "5433:5432" # Port décalé pour éviter les conflits locaux
    networks:
      - keycloak-net

  # Service Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:26.0 # Utilisation d'une version plus récente et stable
    container_name: keycloak
    depends_on:
      - keycloak-db
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

      # Configuration DEV & Accessibilité
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_LOG_LEVEL: info

      # OPTIMISATION THEME (Désactive le cache pour le développement)
      KC_CACHE_THEME_RESOURCES: "false"
      KC_CACHE_THEME_TEMPLATES: "false"

    # Commande pour démarrer en mode dev et importer le realm
    command: start-dev --import-realm

    volumes:
      # Montage du fichier realm pour import au démarrage
      - ./keycloak/realm-dev.json:/opt/keycloak/data/import/realm.json:ro

      # MONTAGE DU THÈME (Indispensable pour vos fichiers FTL/CSS)
      # On monte le dossier parent 'themes' pour que Keycloak trouve 'financeapp'
      - ./keycloak/themes:/opt/keycloak/themes:rw

    ports:
      - "8080:8080"
    networks:
      - keycloak-net

volumes:
  keycloak_data:

networks:
  keycloak-net: